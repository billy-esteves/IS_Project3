services:
  database:
    image: postgres:17
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nopass
      POSTGRES_DB: project3
    volumes:
      - ../sql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql

  broker1:
    image: confluentinc/cp-kafka:8.1.0
    ports:
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker1:9093"
      KAFKA_LISTENERS: INTERNAL://broker1:9092,CONTROLLER://broker1:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker1:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

  connect:
    image: confluentinc/cp-kafka-connect:8.1.0
    depends_on:
      - broker1
    ports:
      - 8083:8083
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=broker1:9092
      - CONNECT_REST_ADVERTISED_PORT=8083
      - CONNECT_REST_ADVERTISED_HOST_NAME=connect
      - CONNECT_GROUP_ID=connect
      - CONNECT_CONFIG_STORAGE_TOPIC=_connect_configs
      - CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_OFFSET_STORAGE_TOPIC=_connect_offsets
      - CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_STATUS_STORAGE_TOPIC=_connect_status
      - CONNECT_STATUS_STORAGE_REPLICATION_FACTOR=1
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_PLUGIN_PATH=/usr/share/java,/usr/share/confluent-hub-components,/etc/kafka-connect/jars
    volumes:
      - ../config:/config
      - ../lib:/etc/kafka-connect/jars
    command:
      - /bin/bash
      - -c
      - |
        if [ ! -d /usr/share/confluent-hub-components/confluentinc-kafka-connect-jdbc ]; then
          confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
        fi
        chmod -R a+rX /etc/kafka-connect/jars
        /etc/confluent/docker/run

  command-line:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    command: tail -f /dev/null
    working_dir: /workspace
    volumes:
      - ${localWorkspaceFolder:-..}:/workspace:cached
